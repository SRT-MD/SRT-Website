<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 416" role="img" aria-labelledby="title desc">
  <title id="title">Southern Rescue Tools</title>
  <desc id="desc">Transparent vector wordmark for Southern Rescue Tools.</desc>
  <defs>
    <filter id="edge" x="-2%" y="-8%" width="104%" height="116%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#edge)" font-family="Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif" font-weight="900" letter-spacing="0">
    <text x="18" y="162" fill="#ffd400" stroke="#050505" stroke-width="10" paint-order="stroke" font-size="176">SOUTHERN</text>
    <text x="20" y="340" fill="#ffffff" stroke="#050505" stroke-width="10" paint-order="stroke" font-size="160">RESCUE TOOLS</text>
  </g>
</svg>
